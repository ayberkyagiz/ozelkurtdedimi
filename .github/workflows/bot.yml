name: twitterbot

on:
  schedule:
    # Türkiye saati 14:00  -> UTC 11:00
    - cron: "0 11 * * *"
    # Türkiye saati 19:00  -> UTC 16:00
    - cron: "0 16 * * *"
    # Türkiye saati 23:59 -> UTC 20:59
    - cron: "59 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 tweepy

      - name: Run bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python bot.py

      - name: Commit state/history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json history.csv || true
          git commit -m "Update bot state" || echo "No changes"
          git push || true
